<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Học Tập Lớp 5</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f0f8ff;
}

header {
    background: #4CAF50;
    color: white;
    padding: 15px;
    text-align: center;
}

nav {
    background: #333;
    padding: 10px;
    text-align: center;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    color: yellow;
}

.hero {
    text-align: center;
    padding: 40px;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
}

.hero button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: yellow;
    cursor: pointer;
    font-weight: bold;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
}

.card {
    background: white;
    width: 250px;
    margin: 10px;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 10px #ccc;
    text-align: center;
}

.card a {
    display: inline-block;
    margin-top: 10px;
    padding: 10px;
    background: #4CAF50;
    color: white;
    border-radius: 8px;
    text-decoration: none;
}

footer {
    background: #4CAF50;
    color: white;
    text-align: center;
    padding: 10px;
}
</style>
</head>

<body>

<!-- 🔒 Chặn chưa login -->
<script>
if (!localStorage.getItem("currentUser")) {
    window.location.href = "login.html";
}
</script>

<header>
    <h1>📚 Học Tập Lớp 5</h1>
    <p>Học dễ hiểu - Điểm cao 😎</p>
</header>

<nav>
    <a href="#">Trang chủ</a>
    <a href="lesson.html">Bài học</a>
    <a href="game.html">Trò chơi</a>
    <a href="#" onclick="logout()">Đăng xuất</a>
</nav>

<div class="hero">
    <h2 id="hello"></h2>
    <p>Chào mừng bạn đến với website học tập 🎉</p>
    <button onclick="start()">Bắt đầu học</button>
</div>

<div class="container">

    <div class="card">
        <h3>📘 Bài học</h3>
        <p>Học kiến thức Toán, Tiếng Việt, Khoa học</p>
        <a href="lesson.html">Vào học</a>
    </div>

    <div class="card">
        <h3>🎮 Trò chơi</h3>
        <p>Làm 30 câu hỏi + tính điểm + thời gian</p>
        <a href="game.html">Chơi ngay</a>
    </div>

</div>

<footer>
    © 2026 - Web học tập lớp 5
</footer>

<script>
// 👤 Hiển thị user
let user = localStorage.getItem("currentUser");
document.getElementById("hello").innerText = "Xin chào " + user + " 👋";

// 🚀 Nút bắt đầu
function start() {
    window.location.href = "lesson.html";
}

// 🚪 Logout
function logout() {
    localStorage.removeItem("currentUser");
    window.location.href = "login.html";
}
</script>

</body>
</html>
