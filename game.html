<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Trò chơi</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #ffecd2, #fcb69f);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Hộp game */
.box {
    background: white;
    width: 400px;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

/* Timer */
#timer {
    color: red;
    margin-bottom: 10px;
}

/* Câu hỏi */
#question {
    font-size: 20px;
    margin: 15px 0;
}

/* Nút trả lời */
button {
    display: block;
    width: 100%;
    margin: 8px 0;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #4CAF50;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}
</style>
</head>

<body>

<script>
if (!localStorage.getItem("currentUser")) {
    window.location.href = "login.html";
}
</script>

<div class="box">
    <h2 id="timer">⏱️ 60s</h2>
    <h3 id="question"></h3>

    <button onclick="answer(0)" id="a"></button>
    <button onclick="answer(1)" id="b"></button>
    <button onclick="answer(2)" id="c"></button>
    <button onclick="answer(3)" id="d"></button>
</div>

<script>
let current = 0;
let score = 0;
let time = 60;

// tạo 30 câu
let questions = [];

for (let i = 0; i < 30; i++) {
    let a = Math.floor(Math.random()*10);
    let b = Math.floor(Math.random()*10);
    questions.push({
        q: "Câu " + (i+1) + ": " + a + " + " + b + " = ?",
        options: [a+b, a+b+1, a+b-1, a+b+2],
        correct: 0
    });
}

// timer
let timer = setInterval(()=>{
    time--;
    document.getElementById("timer").innerText = "⏱️ " + time + "s";

    if(time <= 0){
        clearInterval(timer);
        endGame();
    }
},1000);

function loadQ() {
    let q = questions[current];
    document.getElementById("question").innerText = q.q;
    document.getElementById("a").innerText = q.options[0];
    document.getElementById("b").innerText = q.options[1];
    document.getElementById("c").innerText = q.options[2];
    document.getElementById("d").innerText = q.options[3];
}

function answer(i){
    if(i === questions[current].correct){
        score++;
    }

    current++;

    if(current >= 30){
        endGame();
    } else {
        loadQ();
    }
}

function endGame(){
    alert("🎉 Kết thúc! Điểm: " + score + "/30");
    window.location.href = "index.html";
}

loadQ();
</script>

</body>
</html>
