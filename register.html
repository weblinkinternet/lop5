<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng ký</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
}
input {
    width: 90%;
    padding: 10px;
    margin: 10px;
}
button {
    width: 95%;
    padding: 10px;
    background: #ff6f61;
    color: white;
    border: none;
}
.msg { color: green; }
</style>
</head>

<body>

<div class="box">
    <h2>📝 Tạo tài khoản</h2>

    <input id="user" placeholder="Tên đăng nhập">
    <input id="pass" type="password" placeholder="Mật khẩu">

    <button onclick="register()">Đăng ký</button>

    <p class="msg" id="msg"></p>

    <p>Đã có tài khoản? 
        <a href="login.html">Đăng nhập</a>
    </p>
</div>

<script>
function register() {
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    if (!user || !pass) {
        document.getElementById("msg").innerText = "Nhập đầy đủ!";
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    if (users.find(u => u.user === user)) {
        document.getElementById("msg").innerText = "Tài khoản đã tồn tại!";
        return;
    }

    users.push({user, pass});
    localStorage.setItem("users", JSON.stringify(users));

    // đăng nhập luôn sau khi tạo
    localStorage.setItem("currentUser", user);

    window.location.href = "index.html";
}
</script>

</body>
</html>
