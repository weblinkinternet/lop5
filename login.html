<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng nhập</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #4CAF50, #00c6ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
}
input {
    width: 90%;
    padding: 10px;
    margin: 10px;
}
button {
    width: 95%;
    padding: 10px;
    background: #4CAF50;
    color: white;
    border: none;
}
.error { color: red; }
</style>
</head>

<body>

<div class="box">
    <h2>🔐 Đăng nhập</h2>

    <input id="user" placeholder="Tên đăng nhập">
    <input id="pass" type="password" placeholder="Mật khẩu">

    <button onclick="login()">Đăng nhập</button>

    <p class="error" id="error"></p>

    <p>Bạn không có tài khoản? 
        <a href="register.html">Tạo tài khoản</a>
    </p>
</div>

<script>
// nếu đã login → vào luôn trang chủ
if (localStorage.getItem("currentUser")) {
    window.location.href = "index.html";
}

function login() {
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let found = users.find(u => u.user === user && u.pass === pass);

    if (found) {
        localStorage.setItem("currentUser", user);
        window.location.href = "index.html";
    } else {
        document.getElementById("error").innerText = "Sai tài khoản!";
    }
}
</script>

</body>
</html>
